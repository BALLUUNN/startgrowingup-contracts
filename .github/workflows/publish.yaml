name: Publish BSR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-bsr-${{ github.ref }}
  cancel-in-progress: false

env:
  BUF_VERSION: "1.71.0"

jobs:
  publish:
    name: Publish To BSR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ github.token }}
          version: ${{ env.BUF_VERSION }}

      - name: Determine breaking baseline
        id: breaking-baseline
        shell: bash
        run: |
          if git rev-parse --verify "${GITHUB_SHA}^" >/dev/null 2>&1; then
            echo "against=.git#ref=$(git rev-parse "${GITHUB_SHA}^")" >> "$GITHUB_OUTPUT"
          else
            echo "against=.git#branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify schema before publish
        run: |
          buf lint
          buf breaking --against "${{ steps.breaking-baseline.outputs.against }}"

      - name: Publish module to BSR
        run: buf push --tag "${GITHUB_REF_NAME}"

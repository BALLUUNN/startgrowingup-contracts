name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ github.token }}

      - name: Generate artifacts
        run: buf generate

      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          cp gen/openapi/api.swagger.json "dist/release/startgrowingup-contracts-${GITHUB_REF_NAME}-openapi.swagger.json"

      - name: Create or update GitHub Release
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

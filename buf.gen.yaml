version: v2

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.0
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/protocolbuffers/python:v28.2
    out: gen/python
    include_imports: true

  - remote: buf.build/grpc/python:v1.66.0
    out: gen/python
    include_imports: true

  - remote: buf.build/protocolbuffers/java:v28.2
    out: gen/java
    include_imports: true

  - remote: buf.build/grpc/java:v1.66.0
    out: gen/java
    include_imports: true

  - remote: buf.build/community/stephenh-ts-proto:v2.2.0
    out: gen/typescript
    opt:
      - outputServices=grpc-js
      - outputClientImpl=grpc-js
      - useExactTypes=false

  - remote: buf.build/grpc-ecosystem/openapiv2:v2.19.0
    out: gen/openapi
    opt:
      - json_names_for_fields=true
      - allow_merge=true
      - merge_file_name=api
